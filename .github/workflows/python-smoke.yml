name: Python Smoke

on:
  pull_request:
  push:
    branches:
      - develop
      - master
      - codex/**
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Sync dependencies
        run: uv sync --dev --group train --group tracking --frozen

      - name: Ruff
        run: uv run ruff check .

      - name: Type check
        run: uv run ty check

      - name: Unit tests
        run: uv run pytest

      - name: Training environment smoke
        run: uv run python scripts/training_env_smoke.py

      - name: Config smoke
        run: uv run python scripts/show_config.py --config configs/base.toml --override runtime.seed=123 --override backends.allow_tensorrt=true

      - name: Reproducibility smoke
        run: uv run python scripts/repro_check.py --config configs/base.toml --self-check
