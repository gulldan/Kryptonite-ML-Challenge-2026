base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-ms32-strict-consensus-pseudo-lowlr"',
  'tracking.run_name_prefix="campp-ms32-consensus-pseudo"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=256',
  'training.eval_batch_size=256',
  'training.max_epochs=2',
  'features.frontend="official_campp"',
  'features.output_dtype="float32"',
  'feature_cache.namespace="official-campp-fbank-v1"',
  'chunking.train_min_crop_seconds=6.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=true',
  'silence_augmentation.max_leading_padding_seconds=0.12',
  'silence_augmentation.max_trailing_padding_seconds=0.25',
  'silence_augmentation.max_inserted_pauses=2',
  'silence_augmentation.min_inserted_pause_seconds=0.06',
  'silence_augmentation.max_inserted_pause_seconds=0.24',
  'silence_augmentation.pause_ratio_min=0.90',
  'silence_augmentation.pause_ratio_max=1.35',
  'augmentation_scheduler.enabled=true',
  'augmentation_scheduler.warmup_epochs=1',
  'augmentation_scheduler.ramp_epochs=1',
  'augmentation_scheduler.max_augmentations_per_sample=1',
  'augmentation_scheduler.clean_probability_start=0.75',
  'augmentation_scheduler.clean_probability_end=0.50',
  'augmentation_scheduler.light_probability_start=0.20',
  'augmentation_scheduler.light_probability_end=0.30',
  'augmentation_scheduler.medium_probability_start=0.05',
  'augmentation_scheduler.medium_probability_end=0.15',
  'augmentation_scheduler.heavy_probability_start=0.0',
  'augmentation_scheduler.heavy_probability_end=0.05',
  'augmentation_scheduler.family_weights.noise=1.00',
  'augmentation_scheduler.family_weights.reverb=0.70',
  'augmentation_scheduler.family_weights.distance=0.70',
  'augmentation_scheduler.family_weights.codec=0.90',
  'augmentation_scheduler.family_weights.silence=0.80',
  'augmentation_scheduler.family_weights.speed=0.20',
]

[data]
train_manifest = "artifacts/manifests/pseudo_ms32_consensus/ms32_strict_consensus_mixed_train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp-ms32-strict-consensus-pseudo-lowlr"
trials_manifest = ""
checkpoint_name = "campp_encoder.pt"
generate_demo_artifacts_if_missing = false
max_dev_rows = 1024

[model]
embedding_size = 512
growth_rate = 32
bottleneck_scale = 4
init_channels = 128
head_channels = 32
head_res_blocks = [2, 2]
tdnn_stride = 2
block_layers = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations = [1, 2, 2]
config = "batchnorm-relu"
memory_efficient = true

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.00003
min_learning_rate = 0.000003
momentum = 0.9
weight_decay = 0.00005
warmup_epochs = 1
gradient_accumulation_steps = 1
grad_clip_norm = 5.0
early_stopping_enabled = true
early_stopping_monitor = "train_loss"
early_stopping_min_delta = 0.0005
early_stopping_patience_epochs = 2
early_stopping_min_epochs = 2
early_stopping_restore_best = true
early_stopping_stop_train_accuracy = 0.9975

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "local://artifacts/baselines/campp-ms31-official-pseudo-filtered-lowlr/20260414T055357Z-f1f2fa87143a/campp_encoder.pt",
  "local://artifacts/backbone_public/modelscope_campplus_voxceleb_default/ms32_pseudo_ms31_20260414T0551Z",
]
notes = [
  "Short strict-consensus pseudo-label stage from the MS32 official CAM++ checkpoint.",
  "Pseudo labels are derived from MS32 teacher clusters and kept only when MS31, MS30, and optional MS1 exact neighbours confirm the same teacher cluster with local margin filtering.",
  "Training uses fixed 6s crops with the official CAM++ frontend and lighter augmentation than MS32 to reduce pseudo-label amplification.",
  "This stage is intended to be followed by a short clean finish on real participant labels.",
]
