# CAM++ distillation: frozen PEFT teacher -> repo-native CAM++ student (KRYP-055)
#
# Scope notes:
#   - student family is intentionally fixed to CAM++ because KVA-536 froze CAM++
#     as the production-student family for the current repository cycle
#   - teacher stays frozen; only the student encoder/classifier are updated
#   - baseline comparison re-evaluates the warm-start checkpoint on the same dev
#     manifest so deltas are apples-to-apples

base_stage3_config = "configs/training/campp-stage3.toml"

project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-distillation"',
  'tracking.run_name_prefix="campp-distill"',
  'runtime.num_workers=4',
  'training.precision="bf16"',
  'training.batch_size=16',
  'training.eval_batch_size=16',
  'training.max_epochs=4',
]

[data]
train_manifest = "artifacts/manifests/train_manifest.jsonl"
dev_manifest = "artifacts/manifests/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp-distillation"
trials_manifest = ""
checkpoint_name = "campp_distilled_encoder.pt"
generate_demo_artifacts_if_missing = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.0001
min_learning_rate = 0.00001
weight_decay = 0.0001
warmup_epochs = 0
gradient_accumulation_steps = 2
grad_clip_norm = 5.0

[provenance]
ruleset = "standard"
initialization = "pretrained"
notes = [
  "KRYP-055: teacher-guided CAM++ student distillation",
  "The student checkpoint stays the comparison anchor and is re-evaluated inside each distillation run.",
]

[student]
# Set this to the completed CAM++ stage-3 run directory or to the checkpoint file itself.
# For ad hoc runs prefer the CLI override:
#   --student-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/campp-stage3/<run-id>
checkpoint = "artifacts/baselines/campp-stage3/<run-id>"

[teacher]
# Set this to the completed teacher PEFT run directory or to the teacher_peft checkpoint dir.
# For ad hoc runs prefer the CLI override:
#   --teacher-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/teacher-peft/<run-id>
checkpoint = "artifacts/baselines/teacher-peft/<run-id>"

[distillation]
classification_weight = 1.0
embedding_weight = 0.35
score_weight = 0.15
