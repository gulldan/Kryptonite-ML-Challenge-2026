base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-restricted-rules"',
  'tracking.run_name_prefix="campp-restricted"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=16',
  'training.eval_batch_size=16',
  'training.max_epochs=10',
  'chunking.train_min_crop_seconds=3.0',
  'chunking.train_max_crop_seconds=3.0',
  'chunking.train_num_crops=1',
]

[data]
train_manifest = "artifacts/manifests/ffsvc2022-surrogate/train_manifest.jsonl"
dev_manifest = "artifacts/manifests/ffsvc2022-surrogate/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp/restricted-rules"
trials_manifest = "artifacts/manifests/ffsvc2022-surrogate/speaker_disjoint_dev_trials.jsonl"
checkpoint_name = "campp_encoder.pt"
generate_demo_artifacts_if_missing = false

[model]
embedding_size = 512
growth_rate = 32
bottleneck_scale = 4
init_channels = 128
head_channels = 32
head_res_blocks = [2, 2]
block_layers = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations = [1, 2, 2]
memory_efficient = true

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.0015
min_learning_rate = 0.00005
momentum = 0.9
weight_decay = 0.0001
warmup_epochs = 1
gradient_accumulation_steps = 2
grad_clip_norm = 5.0

[provenance]
ruleset = "restricted-rules"
initialization = "from_scratch"
teacher_resources = []
pretrained_resources = []
notes = [
  "Repo-native CAM++ encoder trained only from local manifests and labels.",
  "The restricted fallback forbids external teacher checkpoints and pretrained warm starts.",
  "Use this config when challenge rules must be satisfied without ambiguity.",
]
