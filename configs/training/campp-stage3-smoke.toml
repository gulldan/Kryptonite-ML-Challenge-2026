# CAM++ stage-3 smoke config.
#
# Use this for local/demo validation after producing a compatible stage-2 smoke run.
# Pass the completed stage-2 run directory (or the checkpoint file itself) via:
#   --stage2-checkpoint artifacts/baselines/campp-stage2/<run-id>

base_config = "configs/base.toml"

project_overrides = [
  'tracking.enabled=false',
  'runtime.num_workers=0',
  'training.batch_size=4',
  'training.eval_batch_size=4',
  'training.max_epochs=2',
  'augmentation_scheduler.enabled=false',
  'silence_augmentation.enabled=false',
]

[data]
train_manifest = "artifacts/manifests/demo_manifest.jsonl"
dev_manifest   = "artifacts/manifests/demo_manifest.jsonl"
output_root    = "artifacts/baselines/campp-stage3-smoke"
trials_manifest = ""
checkpoint_name = "campp_stage3_encoder.pt"
generate_demo_artifacts_if_missing = true

[model]
embedding_size   = 512
growth_rate      = 32
bottleneck_scale = 4
init_channels    = 128
head_channels    = 32
head_res_blocks  = [2, 2]
block_layers     = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations  = [1, 2, 2]
memory_efficient = true

[objective]
classifier_blocks     = 0
classifier_hidden_dim = 512
scale      = 32.0
margin     = 0.3
easy_margin = false

[optimization]
learning_rate     = 0.005
min_learning_rate = 0.000005
momentum          = 0.9
weight_decay      = 0.0001
warmup_epochs     = 0
grad_clip_norm    = 5.0

[provenance]
ruleset        = "standard"
initialization = "pretrained"
pretrained_resources = ["campp_stage2_encoder.pt"]
notes = [
  "KRYP-043: stage-3 smoke validation",
  "Initialised from a completed CAM++ stage-2 smoke run",
]

[stage3]
stage2_checkpoint = "artifacts/baselines/campp-stage2/<run-id>"

[stage3.hard_negative]
enabled                    = false
mining_interval_epochs     = 1
top_k_per_speaker          = 10
hard_negative_fraction     = 0.25
max_train_rows_for_mining  = 200

[stage3.crop_curriculum]
enabled              = true
start_crop_seconds   = 1.5
end_crop_seconds     = 3.0
curriculum_epochs    = 1

[stage3.margin_schedule]
enabled       = true
start_margin  = 0.30
end_margin    = 0.45
ramp_epochs   = 2
