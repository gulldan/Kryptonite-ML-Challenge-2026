# CAM++ stage-2: heavy multi-condition training (KRYP-042)
#
# Requires: campp_stage1_encoder.pt produced by stage-1 pretraining (KRYP-041)
#
# Key differences from stage-1 baseline:
#   - Loads stage-1 checkpoint for warm initialisation
#   - Augmentation scheduler starts in "steady" mode (warmup_epochs=0, ramp_epochs=0)
#   - Heavy/medium corruption dominates (heavy 45→55 %, medium 35→30 %, clean only 5 %)
#   - max_augmentations_per_sample raised to 3
#   - Short-utterance curriculum: 1.5 s → 2.75 s → 4.0 s across three training phases
#   - Hard-negative speaker mining every 2 epochs
#   - AdamW + cosine decay in bf16 with accumulation=2 (effective batch 64 on 4090-class GPUs)

base_config = "configs/base.toml"

project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-stage2"',
  'tracking.run_name_prefix="campp-s2"',
  'runtime.num_workers=4',
  'training.precision="bf16"',
  # 32 micro-batches x accumulation 2 => effective batch size 64
  'training.batch_size=32',
  'training.eval_batch_size=32',
  'training.max_epochs=20',
  # Heavy augmentation from epoch 1 — skip warmup and ramp entirely
  'augmentation_scheduler.warmup_epochs=0',
  'augmentation_scheduler.ramp_epochs=0',
  'augmentation_scheduler.max_augmentations_per_sample=3',
  'augmentation_scheduler.clean_probability_start=0.05',
  'augmentation_scheduler.clean_probability_end=0.05',
  'augmentation_scheduler.light_probability_start=0.15',
  'augmentation_scheduler.light_probability_end=0.10',
  'augmentation_scheduler.medium_probability_start=0.35',
  'augmentation_scheduler.medium_probability_end=0.30',
  'augmentation_scheduler.heavy_probability_start=0.45',
  'augmentation_scheduler.heavy_probability_end=0.55',
  # Enable silence augmentation in stage-2
  'silence_augmentation.enabled=true',
]

[data]
train_manifest = "artifacts/manifests/train_manifest.jsonl"
dev_manifest   = "artifacts/manifests/dev_manifest.jsonl"
output_root    = "artifacts/baselines/campp-stage2"
trials_manifest = ""
checkpoint_name = "campp_stage2_encoder.pt"
generate_demo_artifacts_if_missing = false

[model]
embedding_size   = 512
growth_rate      = 32
bottleneck_scale = 4
init_channels    = 128
head_channels    = 32
head_res_blocks  = [2, 2]
block_layers     = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations  = [1, 2, 2]
memory_efficient = true

[objective]
classifier_blocks     = 0
classifier_hidden_dim = 512
scale      = 32.0
margin     = 0.3
easy_margin = false

[optimization]
optimizer_name    = "adamw"
scheduler_name    = "cosine"
learning_rate     = 0.0008
min_learning_rate = 0.00005
momentum          = 0.9
weight_decay      = 0.0001
warmup_epochs     = 1
gradient_accumulation_steps = 2
grad_clip_norm    = 5.0

[provenance]
ruleset        = "standard"
initialization = "pretrained"
pretrained_resources = ["campp_stage1_encoder.pt"]
notes = [
  "KRYP-042: stage-2 heavy multi-condition training",
  "Initialised from KRYP-041 stage-1 checkpoint",
]

[stage2]
# Set this to the completed stage-1 run directory or to the checkpoint file itself.
# For ad hoc runs prefer the CLI override:
#   --stage1-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/campp-stage1/<run-id>
stage1_checkpoint = "artifacts/baselines/campp-stage1/<run-id>"

[stage2.hard_negative]
enabled                    = true
mining_interval_epochs     = 2
top_k_per_speaker          = 20
hard_negative_fraction     = 0.5
max_train_rows_for_mining  = 5000

[stage2.utterance_curriculum]
enabled             = true
short_crop_seconds  = 1.5
long_crop_seconds   = 4.0
curriculum_epochs   = 7
