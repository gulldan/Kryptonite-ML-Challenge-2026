# CAM++ stage-3: large-margin fine-tuning (KRYP-043)
#
# Requires: campp_stage2_encoder.pt produced by stage-2 heavy multi-condition training.
#
# Key differences from stage-2:
#   - Warm-starts from the completed stage-2 checkpoint
#   - Moves to a more target-like augmentation mix with low heavy-corruption probability
#   - Increases fixed crop size from 4.0 s to 6.0 s across three phases
#   - Ramps ArcMargin from 0.30 to 0.45 during the early fine-tuning epochs
#   - Uses AdamW + cosine decay in bf16 with accumulation=2 (effective batch 48)

base_config = "configs/base.toml"

project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-stage3"',
  'tracking.run_name_prefix="campp-s3"',
  'runtime.num_workers=4',
  'training.precision="bf16"',
  # 24 micro-batches x accumulation 2 => effective batch size 48
  'training.batch_size=24',
  'training.eval_batch_size=24',
  'training.max_epochs=8',
  'augmentation_scheduler.max_augmentations_per_sample=2',
  'augmentation_scheduler.clean_probability_start=0.55',
  'augmentation_scheduler.clean_probability_end=0.45',
  'augmentation_scheduler.light_probability_start=0.30',
  'augmentation_scheduler.light_probability_end=0.35',
  'augmentation_scheduler.medium_probability_start=0.10',
  'augmentation_scheduler.medium_probability_end=0.15',
  'augmentation_scheduler.heavy_probability_start=0.05',
  'augmentation_scheduler.heavy_probability_end=0.05',
  'silence_augmentation.enabled=true',
]

[data]
train_manifest = "artifacts/manifests/ffsvc2022-surrogate/train_manifest.jsonl"
dev_manifest   = "artifacts/manifests/ffsvc2022-surrogate/dev_manifest.jsonl"
output_root    = "artifacts/baselines/campp-stage3"
trials_manifest = ""
checkpoint_name = "campp_stage3_encoder.pt"
generate_demo_artifacts_if_missing = false

[model]
embedding_size   = 512
growth_rate      = 32
bottleneck_scale = 4
init_channels    = 128
head_channels    = 32
head_res_blocks  = [2, 2]
block_layers     = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations  = [1, 2, 2]
memory_efficient = true

[objective]
classifier_blocks     = 0
classifier_hidden_dim = 512
scale      = 32.0
margin     = 0.3
easy_margin = false

[optimization]
optimizer_name    = "adamw"
scheduler_name    = "cosine"
learning_rate     = 0.0004
min_learning_rate = 0.00002
momentum          = 0.9
weight_decay      = 0.0001
warmup_epochs     = 1
gradient_accumulation_steps = 2
grad_clip_norm    = 5.0

[provenance]
ruleset        = "standard"
initialization = "pretrained"
pretrained_resources = ["campp_stage2_encoder.pt"]
notes = [
  "KRYP-043: stage-3 large-margin fine-tuning",
  "Initialised from KRYP-042 stage-2 checkpoint",
]

[stage3]
# Set this to the completed stage-2 run directory or to the checkpoint file itself.
# For ad hoc runs prefer the CLI override:
#   --stage2-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/campp-stage2/<run-id>
stage2_checkpoint = "artifacts/baselines/campp-stage2/<run-id>"

[stage3.hard_negative]
enabled                    = false
mining_interval_epochs     = 2
top_k_per_speaker          = 20
hard_negative_fraction     = 0.25
max_train_rows_for_mining  = 5000

[stage3.crop_curriculum]
enabled              = true
start_crop_seconds   = 4.0
end_crop_seconds     = 6.0
curriculum_epochs    = 3

[stage3.margin_schedule]
enabled       = true
start_margin  = 0.30
end_margin    = 0.45
ramp_epochs   = 6
