title = "Kryptonite 2026 Experiment Matrix v1"
matrix_id = "kryptonite-2026-experiment-matrix-v1"
accepted_at = "2026-03-28"
summary = """
Freeze one minimal, reproducible launch set that covers the repo-native student
lane first, keeps one comparison baseline, records the cheap offline scoring
experiments explicitly, and leaves teacher-heavy work in a clearly de-scoped
stretch bucket.
"""
context = """
KVA-483 asked for the minimal launch set spanning CAM++, ERes2NetV2, baseline
augmentation, heavy augmentation, large-margin fine-tuning, AS-norm, TAS-norm,
teacher PEFT, and distillation.

As of 2026-03-28 the repository already contains checked-in, reproducible
workflows for the student baselines, staged CAM++ training, and offline
score-normalization experiments. The final-family ADR and release postmortem now
also make one extra constraint explicit: teacher-heavy work must not block the
must-have student/export path until one exportable student family is frozen and
parity-tested.
"""
output_root = "artifacts/planning/kryptonite-2026-experiment-matrix-v1"

assumptions = [
  "GPU-hour estimates target one 24 GB RTX 4090-class GPU on gpu-server and are planning estimates, not measured benchmark numbers.",
  "Offline AS-norm and TAS-norm work can run on exported embeddings without reserving dedicated GPU time; their budgets stay near-zero for sequencing clarity.",
  "Teacher PEFT and distillation remain planning-only rows because the repository does not yet contain runnable PEFT/distillation entrypoints.",
  "For CAM++ and ERes2NetV2 baselines, use real train/dev manifests on gpu-server instead of the demo smoke manifests checked into the baseline configs.",
]

validation_commands = [
  "uv run python scripts/build_experiment_matrix.py --config configs/training/experiment-matrix-v1.toml",
  "uv run pytest tests/unit/test_experiment_matrix.py",
]

[[experiment]]
sequence = 1
experiment_id = "campp_stage1"
label = "CAM++ baseline augment / stage-1 pretraining"
linear_issue = "KVA-519"
family = "CAM++"
track = "student_training"
priority = "P0"
repo_state = "ready_gpu"
summary = "Run the repo-native CAM++ student anchor with light augmentation and short-to-medium crops to produce the warm-start checkpoint for the full CAM++ lane."
expected_effect = "Establish the main student anchor and unlock every later CAM++ training step."
gpu_hours_low = 4.0
gpu_hours_high = 8.0
depends_on = []
evidence_paths = [
  "configs/training/campp-baseline.toml",
  "scripts/run_campp_baseline.py",
  "docs/campp-baseline.md",
]
command = """
uv run python scripts/run_campp_baseline.py \
  --config configs/training/campp-baseline.toml \
  --project-override 'paths.project_root="/mnt/storage/Kryptonite-ML-Challenge-2026"' \
  --project-override 'runtime.num_workers=8' \
  --device cuda
"""
notes = [
  "Use the resulting run directory or checkpoint as the warm-start input for stage-2.",
  "The checked-in config is smoke-oriented; swap in real manifests on gpu-server before treating this as a decision-quality run.",
]

[[experiment]]
sequence = 2
experiment_id = "eres2netv2_baseline"
label = "ERes2NetV2 comparison baseline"
linear_issue = "KVA-513"
family = "ERes2NetV2"
track = "comparison_baseline"
priority = "P1"
repo_state = "ready_gpu"
summary = "Run one repo-native ERes2NetV2 baseline on the same manifest contract to keep a second compact family in the comparison set."
expected_effect = "Quantify whether the comparison family is meaningfully better than the CAM++ student anchor before any deeper branching."
gpu_hours_low = 4.0
gpu_hours_high = 6.0
depends_on = []
evidence_paths = [
  "configs/training/eres2netv2-baseline.toml",
  "scripts/run_eres2netv2_baseline.py",
  "docs/eres2netv2-baseline.md",
]
command = """
uv run python scripts/run_eres2netv2_baseline.py \
  --config configs/training/eres2netv2-baseline.toml \
  --project-override 'paths.project_root="/mnt/storage/Kryptonite-ML-Challenge-2026"' \
  --project-override 'runtime.num_workers=8' \
  --device cuda
"""
notes = [
  "Keep this as one clean comparison baseline; do not multiply family branches before the main CAM++ lane is understood.",
]

[[experiment]]
sequence = 3
experiment_id = "campp_stage2"
label = "CAM++ heavy multi-condition training"
linear_issue = "KVA-520"
family = "CAM++"
track = "student_training"
priority = "P0"
repo_state = "ready_gpu"
summary = "Warm-start CAM++ from stage-1 and push robustness through the heavy corruption curriculum, hard-negative mining, and short-utterance curriculum."
expected_effect = "Primary robustness gain on corrupted slices and the required parent checkpoint for stage-3."
gpu_hours_low = 12.0
gpu_hours_high = 18.0
depends_on = ["campp_stage1"]
evidence_paths = [
  "configs/training/campp-stage2.toml",
  "scripts/run_campp_stage2_training.py",
  "docs/campp-stage2-training.md",
]
command = """
uv run python scripts/run_campp_stage2_training.py \
  --config configs/training/campp-stage2.toml \
  --stage1-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/campp/<run-id> \
  --device cuda
"""
notes = [
  "This is the most expensive must-have training run in the matrix because corruption and hard-negative passes dominate runtime.",
  "Use a completed stage-1 run directory or checkpoint instead of the placeholder path above.",
]

[[experiment]]
sequence = 4
experiment_id = "campp_stage3"
label = "CAM++ large-margin fine-tuning"
linear_issue = "KVA-521"
family = "CAM++"
track = "student_training"
priority = "P0"
repo_state = "ready_gpu"
summary = "Adapt the robustness-heavy stage-2 checkpoint back toward the target operating regime with longer crops and a staged margin schedule."
expected_effect = "Recover clean and target-like verification quality after stage-2 while keeping a useful slice of robustness."
gpu_hours_low = 6.0
gpu_hours_high = 10.0
depends_on = ["campp_stage2"]
evidence_paths = [
  "configs/training/campp-stage3.toml",
  "scripts/run_campp_stage3_training.py",
  "docs/campp-stage3-training.md",
]
command = """
uv run python scripts/run_campp_stage3_training.py \
  --config configs/training/campp-stage3.toml \
  --stage2-checkpoint /mnt/storage/Kryptonite-ML-Challenge-2026/artifacts/baselines/campp-stage2/<run-id> \
  --device cuda
"""
notes = [
  "Keep the bounded shortlist (KVA-523) as an optional refinement, not as part of this minimal matrix v1.",
]

[[experiment]]
sequence = 5
experiment_id = "as_norm"
label = "AS-norm baseline on the selected student artifacts"
linear_issue = "KVA-527"
family = "offline_scoring"
track = "score_normalization"
priority = "P1"
repo_state = "ready_offline"
summary = "Apply one reproducible AS-norm pass on top of the chosen student artifacts and the frozen cohort bank."
expected_effect = "Cheap offline quality lift and a normalized score baseline for later comparison against TAS-norm."
gpu_hours_low = 0.0
gpu_hours_high = 0.5
depends_on = ["campp_stage3"]
evidence_paths = [
  "scripts/evaluate_verification_scores.py",
  "docs/as-norm-baseline.md",
  "docs/cohort-embedding-bank.md",
]
command = """
uv run python scripts/evaluate_verification_scores.py \
  --scores artifacts/baselines/campp-stage3/<run-id>/dev_scores.jsonl \
  --trials artifacts/baselines/campp-stage3/<run-id>/dev_trials.jsonl \
  --metadata artifacts/baselines/campp-stage3/<run-id>/dev_embedding_metadata.parquet \
  --embeddings artifacts/baselines/campp-stage3/<run-id>/dev_embeddings.npz \
  --cohort-bank artifacts/eval/cohort-bank/campp-<run-id> \
  --score-normalization as-norm \
  --as-norm-top-k 100 \
  --output-dir artifacts/eval/as-norm/campp-<run-id>
"""
notes = [
  "This row is intentionally cheap: it consumes exported embeddings and scores instead of training a new encoder.",
]

[[experiment]]
sequence = 6
experiment_id = "tas_norm"
label = "TAS-norm go/no-go experiment"
linear_issue = "KVA-528"
family = "offline_scoring"
track = "score_normalization"
priority = "P2"
repo_state = "ready_offline"
summary = "Run one explicit trainable score-normalization experiment instead of silently changing the scoring path."
expected_effect = "Record whether a learned score head beats raw and AS-norm on a large enough verification split."
gpu_hours_low = 0.5
gpu_hours_high = 1.5
depends_on = ["as_norm"]
evidence_paths = [
  "configs/release/tas-norm-experiment.toml",
  "scripts/build_tas_norm_experiment.py",
  "docs/tas-norm-experiment.md",
]
command = """
uv run python scripts/build_tas_norm_experiment.py \
  --config configs/release/tas-norm-experiment.toml
"""
notes = [
  "The checked-in smoke result is already `no_go`; only revisit this row on a larger verification set.",
]

