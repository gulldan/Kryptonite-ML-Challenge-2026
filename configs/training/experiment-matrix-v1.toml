[[experiment]]
sequence = 8
experiment_id = "distillation"
label = "Distillation into a compact student"
linear_issue = "KVA-533"
family = "student_distillation"
track = "stretch_teacher"
priority = "P3"
repo_state = "deferred_stretch"
