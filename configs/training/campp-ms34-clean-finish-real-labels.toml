base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-ms34-clean-finish-real-labels"',
  'tracking.run_name_prefix="campp-ms34-clean-finish"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=256',
  'training.eval_batch_size=256',
  'training.max_epochs=2',
  'features.frontend="official_campp"',
  'features.output_dtype="float32"',
  'feature_cache.namespace="official-campp-fbank-v1"',
  'chunking.train_min_crop_seconds=6.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=false',
  'augmentation_scheduler.enabled=false',
]

[data]
train_manifest = "artifacts/manifests/participants_fixed/train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp-ms34-clean-finish-real-labels"
trials_manifest = ""
checkpoint_name = "campp_encoder.pt"
generate_demo_artifacts_if_missing = false
max_dev_rows = 1024

[model]
embedding_size = 512
growth_rate = 32
bottleneck_scale = 4
init_channels = 128
head_channels = 32
head_res_blocks = [2, 2]
tdnn_stride = 2
block_layers = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations = [1, 2, 2]
config = "batchnorm-relu"
memory_efficient = true

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.00001
min_learning_rate = 0.000002
momentum = 0.9
weight_decay = 0.00005
warmup_epochs = 1
gradient_accumulation_steps = 1
grad_clip_norm = 5.0
early_stopping_enabled = true
early_stopping_monitor = "train_loss"
early_stopping_min_delta = 0.0003
early_stopping_patience_epochs = 1
early_stopping_min_epochs = 2
early_stopping_restore_best = true
early_stopping_stop_train_accuracy = 0.9980

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "local://artifacts/baselines/campp-ms32-strict-consensus-pseudo-lowlr/<run>/campp_encoder.pt",
  "local://artifacts/baselines/campp-ms31-official-pseudo-filtered-lowlr/20260414T055357Z-f1f2fa87143a/campp_encoder.pt",
]
notes = [
  "Clean finish after the strict-consensus pseudo stage.",
  "Uses only real participant challenge labels, fixed 6s crops, official CAM++ frontend, and no on-the-fly augmentation.",
  "Public evaluation should use scripts/run_official_campp_tail.py with mode=segment_mean, eval_chunk_seconds=6.0, segment_count=3, and the packed official public frontend cache.",
]
