title = "Kryptonite Internal Verification Protocol"
ticket_id = "KVA-481"
protocol_id = "kryptonite-internal-verification-protocol"
summary = "Freeze one repo-native verification protocol that keeps the clean dev references, strict speaker-disjoint trials, and production-like corrupted suites in one auditable snapshot."
output_root = "artifacts/eval/verification-protocol"
required_slice_fields = [
  "duration_bucket",
  "noise_slice",
  "rt60_slice",
  "codec_slice",
  "channel_slice",
  "distance_slice",
  "silence_ratio_bucket",
  "silence_slice",
]
corrupted_suite_catalog_path = "artifacts/eval/corrupted-dev-suites/corrupted_dev_suites_catalog.json"
validation_commands = [
  "uv run python scripts/prepare_ffsvc2022_surrogate.py",
  "uv run python scripts/build_corrupted_dev_suites.py --config configs/base.toml --plan configs/corruption/corrupted-dev-suites.toml",
  "uv run python scripts/build_verification_protocol.py --config configs/eval/verification-protocol.toml",
]
notes = [
  "The clean protocol stays anchored to the held-out dev manifest and two complementary trial lists: the public FFSVC-style reference list and the strict speaker-disjoint list for threshold tuning.",
  "The production-like protocol is intentionally modeled as the corrupted-dev catalog rather than one opaque mega-trial file, so each robustness family keeps explicit provenance and replay commands.",
]

[[clean_sets]]
bundle_id = "official-dev-reference"
stage = "dev"
description = "Public FFSVC-style reference trials for parity checks against the original development protocol."
trial_manifest_path = "artifacts/manifests/ffsvc2022-surrogate/official_dev_trials.jsonl"
metadata_manifest_path = "artifacts/manifests/ffsvc2022-surrogate/dev_manifest.jsonl"
notes = [
  "Use this bundle for smoke parity and public-style score comparisons, not for threshold selection.",
]

[[clean_sets]]
bundle_id = "speaker-disjoint-dev"
stage = "prod_base"
description = "Strict speaker-disjoint clean bundle used as the base trial list for threshold tuning and production-like stress suites."
trial_manifest_path = "artifacts/manifests/ffsvc2022-surrogate/speaker_disjoint_dev_trials.jsonl"
metadata_manifest_path = "artifacts/manifests/ffsvc2022-surrogate/dev_manifest.jsonl"
notes = [
  "This bundle should remain deterministic and speaker-disjoint whenever the held-out dev manifest is regenerated.",
]
