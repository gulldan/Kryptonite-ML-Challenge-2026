[paths]
project_root = "."
dataset_root = "datasets"
artifacts_root = "artifacts"
cache_root = "artifacts/cache"
manifests_root = "artifacts/manifests"

[runtime]
seed = 42
device = "cuda"
log_level = "INFO"
num_workers = 4

[reproducibility]
deterministic = true
pythonhashseed = 42
fingerprint_paths = [
  "configs/base.toml",
  "configs/deployment/infer-gpu.toml",
  "configs/schema.json",
]

[training]
batch_size = 16
eval_batch_size = 32
max_epochs = 10
precision = "fp32"

[backends]
inference = "torch"
export = "onnx"
allow_torch = true
allow_onnx = true
allow_tensorrt = false

[export]
opset = 18
dynamic_axes = true
profile = "infer-gpu-smoke"
boundary = "encoder_only"
input_name = "encoder_input"
output_name = "embedding"

[tracking]
enabled = false
backend = "local"
experiment = "kryptonite-infer-gpu"
run_name_prefix = "infer-gpu-smoke"
output_root = "artifacts/tracking"
copy_artifacts = false

[secrets]
wandb_api_key = "WANDB_API_KEY"
mlflow_tracking_token = "MLFLOW_TRACKING_TOKEN"
huggingface_hub_token = "HUGGINGFACE_HUB_TOKEN"

[deployment]
model_bundle_root = "artifacts/model-bundle"
demo_subset_root = "artifacts/demo-subset"
enrollment_cache_root = "artifacts/enrollment-cache"
require_artifacts = false
