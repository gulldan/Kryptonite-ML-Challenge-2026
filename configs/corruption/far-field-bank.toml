notes = [
  "The far-field bank is deterministic and rendered from a synthetic probe waveform rather than a licensed speech corpus.",
  "Each preset captures distance attenuation, off-axis loss, room coupling, and direct-to-reverb ratio as explicit reusable controls.",
  "The preview audio and kernel exports are smoke artifacts for later augmentation work, not a separate training dataset.",
]

[probe]
sample_rate_hz = 16000
duration_seconds = 2.0
peak_amplitude = 0.85

[render]
kernel_duration_seconds = 1.35
speed_of_sound_mps = 343.0
output_peak_limit = 0.92
high_shelf_pivot_hz = 1800.0

[[presets]]
id = "near-reference"
name = "Near field reference"
field = "near"
description = "Close-talking control preset with limited room spill and almost-direct capture."
distance_meters = 0.8
off_axis_angle_deg = 10.0
attenuation_db = 1.5
target_drr_db = 8.5
reverb_rt60_seconds = 0.25
late_reverb_start_ms = 18.0
lowpass_hz = 7200.0
high_shelf_db = -0.5
base_weight = 1.0
early_reflection_delays_ms = [8.0, 16.0]
early_reflection_gains_db = [-18.0, -20.5]
tags = ["near", "control", "close-talk"]

[[presets]]
id = "mid-room-coupled"
name = "Mid room coupled"
field = "mid"
description = "Small meeting-room preset with audible off-axis coloration and moderate room pickup."
distance_meters = 2.1
off_axis_angle_deg = 30.0
attenuation_db = 4.0
target_drr_db = 1.5
reverb_rt60_seconds = 0.45
late_reverb_start_ms = 26.0
lowpass_hz = 5600.0
high_shelf_db = -2.0
base_weight = 1.2
early_reflection_delays_ms = [10.0, 22.0, 35.0]
early_reflection_gains_db = [-10.0, -13.0, -16.5]
tags = ["mid", "meeting-room", "off-axis"]

[[presets]]
id = "far-hall-tail"
name = "Far field hall tail"
field = "far"
description = "Longer-distance hall-style preset with low direct path, steeper HF loss, and stronger late reverb."
distance_meters = 4.6
off_axis_angle_deg = 62.0
attenuation_db = 7.0
target_drr_db = -3.5
reverb_rt60_seconds = 0.9
late_reverb_start_ms = 34.0
lowpass_hz = 3600.0
high_shelf_db = -4.5
base_weight = 1.4
early_reflection_delays_ms = [14.0, 28.0, 46.0, 64.0]
early_reflection_gains_db = [-7.5, -9.0, -10.5, -12.0]
tags = ["far", "hall", "low-drr"]
