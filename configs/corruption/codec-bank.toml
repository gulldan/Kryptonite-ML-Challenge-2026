notes = [
  "The codec bank is limited to deterministic FFmpeg-based transforms over a synthetic probe waveform.",
  "Rendered preview audio is a smoke artifact for later augmentation work, not a separate training corpus.",
  "FFmpeg build metadata is captured in the report because codec availability and legal flags depend on the installed build.",
]

[probe]
sample_rate_hz = 16000
duration_seconds = 2.0
peak_amplitude = 0.85

[severity_profiles.light]
description = "Gentle channel narrowing or coloration that should preserve most speaker cues."
weight_multiplier = 1.0

[severity_profiles.medium]
description = "Moderate telephony or VoIP degradation with audible coloration and narrower bandwidth."
weight_multiplier = 1.5

[severity_profiles.heavy]
description = "Aggressive channel loss, codec artifacts, and clipping for robustness stress tests."
weight_multiplier = 2.0

[[presets]]
id = "band-limit-light"
name = "Band-limit light"
family = "band_limit"
severity = "light"
description = "Gentle handset-style band limiting without an explicit codec round-trip."
base_weight = 1.0
highpass_hz = 120.0
lowpass_hz = 7200.0
tags = ["band-limit", "handset"]

[[presets]]
id = "telephony-g711-ulaw"
name = "Telephony G.711 u-law"
family = "telephony"
severity = "medium"
description = "Classic narrowband telephony profile with u-law coding and mild level mismatch."
base_weight = 1.2
highpass_hz = 300.0
lowpass_hz = 3400.0
pre_gain_db = 2.0
codec_name = "pcm_mulaw"
container_extension = "wav"
encode_sample_rate_hz = 8000
tags = ["telephony", "g711", "mulaw"]

[[presets]]
id = "telephony-g711-alaw-heavy"
name = "Telephony G.711 A-law heavy"
family = "telephony"
severity = "heavy"
description = "More aggressive narrowband telephony with stronger gain mismatch and soft clipping."
base_weight = 1.4
highpass_hz = 320.0
lowpass_hz = 3200.0
pre_gain_db = 7.0
soft_clip = true
codec_name = "pcm_alaw"
container_extension = "wav"
encode_sample_rate_hz = 8000
tags = ["telephony", "g711", "alaw", "clipped"]

[[presets]]
id = "voip-aac-lowrate"
name = "VoIP AAC low-rate"
family = "voip"
severity = "medium"
description = "Low-rate wideband VoIP approximation with AAC coding and light device EQ."
base_weight = 1.1
highpass_hz = 140.0
lowpass_hz = 6800.0
codec_name = "aac"
container_extension = "m4a"
encode_sample_rate_hz = 16000
encode_bitrate = "24k"
tags = ["voip", "aac", "wideband"]

[[presets.eq_bands]]
frequency_hz = 1800.0
width_hz = 1100.0
gain_db = 2.5

[[presets]]
id = "compression-adpcm-heavy"
name = "Compression ADPCM heavy"
family = "compression"
severity = "heavy"
description = "ADPCM-style codec round-trip plus bit crushing for obvious quantization artifacts."
base_weight = 1.5
highpass_hz = 180.0
lowpass_hz = 5400.0
bitcrusher_bits = 8
bitcrusher_mix = 0.7
codec_name = "adpcm_ima_wav"
container_extension = "wav"
encode_sample_rate_hz = 16000
tags = ["compression", "adpcm", "quantized"]

[[presets]]
id = "channel-device-coloration"
name = "Channel device coloration"
family = "channel"
severity = "light"
description = "Filter-only device coloration with mild low-end loss and presence bump."
base_weight = 1.0
highpass_hz = 90.0
lowpass_hz = 7600.0
post_gain_db = -1.0
tags = ["channel", "device", "eq"]

[[presets.eq_bands]]
frequency_hz = 900.0
width_hz = 500.0
gain_db = -2.0

[[presets.eq_bands]]
frequency_hz = 2600.0
width_hz = 1400.0
gain_db = 3.0

[[presets]]
id = "channel-clipped-heavy"
name = "Channel clipped heavy"
family = "channel"
severity = "heavy"
description = "Aggressive device coloration with soft clipping and bit-crushed upper mids."
base_weight = 1.3
highpass_hz = 160.0
lowpass_hz = 5000.0
pre_gain_db = 10.0
bitcrusher_bits = 7
bitcrusher_mix = 0.65
soft_clip = true
tags = ["channel", "device", "clipped"]

[[presets.eq_bands]]
frequency_hz = 1300.0
width_hz = 900.0
gain_db = 6.0
