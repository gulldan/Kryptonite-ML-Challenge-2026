]
expected_paths = ["datasets/voxceleb"]
restrictions = [
  "Blocked until the project has a documented primary-source acquisition path.",
]
notes = [
  "If a future primary-source path reappears, keep VoxCeleb1-E and VoxCeleb1-H strictly evaluation-only.",
]

