  "artifacts/manifests/ffsvc2022-surrogate",
]
restrictions = [
  "Allowed only for engineering bring-up and internal smoke checks.",
  "Final challenge-ready training policy must not depend on this dev set.",
]
notes = [
  "The repo already contains an acquisition plan and manifest-preparation flow for this surrogate.",
]

