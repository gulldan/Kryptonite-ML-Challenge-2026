"""
related_issue = "KVA-534"
dependencies = []

[[backlog_item]]
title = "De-scope optional ReDimNet branch comparison until baseline export is stable"
priority = "P3"
disposition = "de_scoped"
area = "teacher"
rationale = """
Alternative families should not re-enter scope until one baseline family has a
