title = "Kryptonite MS32 CAM++ ModelOpt TensorRT FP16 maxopt5 engine"
report_id = "kryptonite-2026-ms32-campp-modelopt-tensorrt-fp16-b128-segment6-maxopt5"
summary = """
Build a max-performance TensorRT FP16 engine for the MS32 CAM++ encoder after
NVIDIA ModelOpt ONNX AutoCast. TensorRT builder optimization level is fixed to
5, so engine build can be slow and is intended for overnight remote runs.
"""
project_root = "."
output_root = "artifacts/release/ms32-campp/modelopt-fp16-b128-segment6-maxopt5"

validation_commands = [
  "uv run --group train python scripts/apply_modelopt_onnx_autocast.py --metadata artifacts/model-bundle-campp-ms32-onnx/metadata.json --output-root artifacts/model-bundle-campp-ms32-onnx-modelopt-fp16 --keep-io-types",
  "uv run --group train python scripts/build_tensorrt_fp16_engine.py --config configs/release/tensorrt-fp16-ms32-b128-segment6-modelopt-maxopt5.toml",
]

notes = [
  "Uses NVIDIA ModelOpt ONNX AutoCast before TensorRT build.",
  "TensorRT builder_optimization_level=5 maximizes tactic search time.",
  "Submit output must be validated and compared against the source MS41 CSV before score-equivalence is assumed.",
]

[artifacts]
model_bundle_metadata_path = "artifacts/model-bundle-campp-ms32-onnx-modelopt-fp16/metadata.json"
engine_output_path = "artifacts/model-bundle-campp-ms32-onnx-modelopt-fp16/model_b128_segment6_maxopt5.plan"

[build]
workspace_size_mib = 8192
builder_optimization_level = 5
promote_validated_backend = false
require_onnxruntime_parity = false

[[build.profiles]]
profile_id = "segment6_b128"
min_batch_size = 1
opt_batch_size = 128
max_batch_size = 128
min_frame_count = 80
opt_frame_count = 600
max_frame_count = 800

[evaluation]
seed = 20260416
warmup_iterations = 10
benchmark_iterations = 50
max_mean_abs_diff = 0.03
max_cosine_distance = 0.001
min_speedup_ratio = 1.05

[[evaluation.samples]]
sample_id = "segment6_b1"
batch_size = 1
frame_count = 600

[[evaluation.samples]]
sample_id = "segment6_b64"
batch_size = 64
frame_count = 600

[[evaluation.samples]]
sample_id = "segment6_b128"
batch_size = 128
frame_count = 600
