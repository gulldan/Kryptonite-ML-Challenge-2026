[[models.commands]]
name = "public_tensorrt_tail"
command = "CUDA_VISIBLE_DEVICES=1 PYTHONUNBUFFERED=1 uv run --group train python scripts/run_official_3dspeaker_eres2net_tail.py --checkpoint-path artifacts/baselines/official-3dspeaker-eres2net-large-filtered-pseudo-lowlr/20260415T040647Z-1f4c2e26a77f/official_3dspeaker_eres2net_encoder.pt --speakerlab-root /tmp/3D-Speaker --manifest-csv artifacts/eda/participants_public_baseline/test_public_manifest.csv --template-csv 'datasets/Для участников/test_public.csv' --data-root 'datasets/Для участников' --output-dir artifacts/speed-family-comparison/official_eres2net_h9_tensorrt --experiment-id SPEED_H9_ERES_TRT_PUBLIC --encoder-backend tensorrt --tensorrt-engine-path artifacts/model-bundle-official-eres2net-h9-onnx/model.plan --device cuda --search-device cuda --batch-size 128 --precision fp32 --search-batch-size 4096 --top-cache-k 200 --chunk-seconds 10.0 --force-embeddings"

[[models.commands]]
