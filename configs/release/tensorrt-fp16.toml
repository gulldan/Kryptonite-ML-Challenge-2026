title = "Kryptonite TensorRT FP16 engine"
report_id = "kryptonite-2026-tensorrt-fp16"
summary = """
Build a TensorRT FP16 engine from the parity-promoted CAM++ ONNX bundle and
compare encoder embeddings plus latency against the source PyTorch checkpoint on
deterministic feature-tensor samples.
"""
project_root = "."
output_root = "artifacts/release/current/fp16"

validation_commands = [
  "uv run python scripts/build_tensorrt_fp16_engine.py --config configs/release/tensorrt-fp16.toml",
  "uv run python scripts/build_triton_model_repository.py --config configs/deployment/infer-gpu.toml --backend-mode tensorrt --engine-path artifacts/model-bundle-campp-onnx/model.plan --override 'deployment.model_bundle_root=\"artifacts/model-bundle-campp-onnx\"'",
]

notes = [
  "This workflow intentionally validates the encoder-only export boundary, not raw-audio runtime parity.",
  "ONNX Runtime parity must already be promoted before TensorRT can be marked validated in metadata.",
  "Run this workflow on gpu-server after syncing the repo-local .venv with the optional TensorRT extras.",
]

[artifacts]
model_bundle_metadata_path = "artifacts/model-bundle-campp-onnx/metadata.json"
engine_output_path = "artifacts/model-bundle-campp-onnx/model.plan"

[build]
workspace_size_mib = 2048
promote_validated_backend = true
require_onnxruntime_parity = true

[[build.profiles]]
profile_id = "short"
min_batch_size = 1
opt_batch_size = 16
max_batch_size = 128
min_frame_count = 80
opt_frame_count = 120
max_frame_count = 180

[[build.profiles]]
profile_id = "mid"
min_batch_size = 1
opt_batch_size = 32
max_batch_size = 256
min_frame_count = 80
opt_frame_count = 256
max_frame_count = 384

[[build.profiles]]
profile_id = "segment6"
min_batch_size = 1
opt_batch_size = 64
max_batch_size = 256
min_frame_count = 80
opt_frame_count = 600
max_frame_count = 800

[evaluation]
seed = 20260328
warmup_iterations = 10
benchmark_iterations = 50
max_mean_abs_diff = 0.01
max_cosine_distance = 0.001
min_speedup_ratio = 1.05

[[evaluation.samples]]
sample_id = "short"
batch_size = 1
frame_count = 100

[[evaluation.samples]]
sample_id = "medium"
batch_size = 1
frame_count = 200

[[evaluation.samples]]
sample_id = "long"
batch_size = 1
frame_count = 600
