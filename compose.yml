x-infer-image: &infer-image
  build:
    context: .
    dockerfile: deployment/docker/infer.Dockerfile
  image: kryptonite-infer:local

services:
  demo:
    <<: *infer-image
    command:
      - python
      - apps/api/main.py
      - --config
      - configs/deployment/infer.toml
      - --port
      - "8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8080/healthz", timeout=5).read()
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "${KRYP_DEMO_PORT:-8080}:8080"
