x-infer-image: &infer-image
  build:
    context: .
    dockerfile: deployment/docker/infer.Dockerfile
  image: kryptonite-infer:local

services:
  demo-artifacts:
    <<: *infer-image
    command:
      - python
      - scripts/generate_demo_artifacts.py
      - --config
      - configs/deployment/infer.toml
    restart: "no"
    volumes:
      - demo_manifests:/app/artifacts/manifests
      - demo_model_bundle:/app/artifacts/model-bundle
      - demo_subset:/app/artifacts/demo-subset
      - demo_enrollment_cache:/app/artifacts/enrollment-cache

  demo:
    <<: *infer-image
    depends_on:
      demo-artifacts:
        condition: service_completed_successfully
    environment:
      KRYP_REQUIRE_DEPLOYMENT_ARTIFACTS: "1"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8080/healthz", timeout=5).read()
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    ports:
      - "${KRYP_DEMO_PORT:-8080}:8080"
    volumes:
      - demo_manifests:/app/artifacts/manifests:ro
      - demo_model_bundle:/app/artifacts/model-bundle:ro
      - demo_subset:/app/artifacts/demo-subset:ro
      - demo_enrollment_cache:/app/artifacts/enrollment-cache

volumes:
  demo_manifests:
  demo_model_bundle:
  demo_subset:
  demo_enrollment_cache:
