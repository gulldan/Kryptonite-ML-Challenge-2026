base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-ms39b-ms32-bn-adapter-pseudo-refresh"',
  'tracking.run_name_prefix="campp-ms39b-ms32-bn-pseudo"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=256',
  'training.eval_batch_size=256',
  'training.max_epochs=1',
  'features.frontend="official_campp"',
  'features.output_dtype="float32"',
  'feature_cache.namespace="official-campp-fbank-v1"',
  'chunking.train_min_crop_seconds=6.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=true',
  'silence_augmentation.max_leading_padding_seconds=0.08',
  'silence_augmentation.max_trailing_padding_seconds=0.18',
  'silence_augmentation.max_inserted_pauses=1',
  'silence_augmentation.min_inserted_pause_seconds=0.06',
  'silence_augmentation.max_inserted_pause_seconds=0.20',
  'silence_augmentation.pause_ratio_min=0.95',
  'silence_augmentation.pause_ratio_max=1.22',
  'augmentation_scheduler.enabled=true',
  'augmentation_scheduler.warmup_epochs=0',
  'augmentation_scheduler.ramp_epochs=1',
  'augmentation_scheduler.max_augmentations_per_sample=1',
  'augmentation_scheduler.clean_probability_start=0.90',
  'augmentation_scheduler.clean_probability_end=0.75',
  'augmentation_scheduler.light_probability_start=0.09',
  'augmentation_scheduler.light_probability_end=0.20',
  'augmentation_scheduler.medium_probability_start=0.01',
  'augmentation_scheduler.medium_probability_end=0.05',
  'augmentation_scheduler.heavy_probability_start=0.0',
  'augmentation_scheduler.heavy_probability_end=0.0',
  'augmentation_scheduler.family_weights.noise=1.00',
  'augmentation_scheduler.family_weights.reverb=0.60',
  'augmentation_scheduler.family_weights.distance=0.60',
  'augmentation_scheduler.family_weights.codec=0.80',
  'augmentation_scheduler.family_weights.silence=0.70',
  'augmentation_scheduler.family_weights.speed=0.10',
]

[data]
train_manifest = "artifacts/manifests/pseudo_ms31/ms31_filtered_mixed_train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp-ms39b-ms32-bn-adapter-pseudo-refresh"
trials_manifest = ""
checkpoint_name = "campp_encoder.pt"
generate_demo_artifacts_if_missing = false
max_dev_rows = 1024

[model]
embedding_size = 512
growth_rate = 32
bottleneck_scale = 4
init_channels = 128
head_channels = 32
head_res_blocks = [2, 2]
tdnn_stride = 2
block_layers = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations = [1, 2, 2]
config = "batchnorm-relu"
memory_efficient = true

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
subcenters_per_class = 1
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.00002
min_learning_rate = 0.000002
momentum = 0.9
weight_decay = 0.0
warmup_epochs = 0
gradient_accumulation_steps = 1
grad_clip_norm = 3.0
early_stopping_enabled = false

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "local://artifacts/baselines/campp-ms31-official-pseudo-filtered-lowlr/20260414T055357Z-f1f2fa87143a/campp_encoder.pt",
  "local://artifacts/manifests/pseudo_ms31/ms31_filtered_mixed_train_manifest.jsonl",
]
notes = [
  "MS39 no-CN branch B: one-epoch BN-only pseudo refresh from MS32.",
  "The launcher must call research/scripts/run_campp_finetune.py with --encoder-trainable-scope batchnorm-affine and --init-classifier-from-checkpoint.",
  "The train manifest matches the MS32 checkpoint speaker index, so the proxy classifier is restored instead of random-initialized.",
  "Encoder convolution/linear weights remain frozen; only BatchNorm affine tensors and running stats adapt.",
  "Single epoch and lower LR/lighter augmentation are intentional because late MS32 full fine-tuning has been fragile.",
]
