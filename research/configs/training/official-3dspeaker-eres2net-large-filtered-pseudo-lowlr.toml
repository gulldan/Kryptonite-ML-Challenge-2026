base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="official-3dspeaker-eres2net-large-filtered-pseudo-lowlr"',
  'tracking.run_name_prefix="h9-official-eres-pseudo"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=96',
  'training.eval_batch_size=128',
  'training.max_epochs=4',
  'features.frontend="official_campp"',
  'features.output_dtype="float32"',
  'feature_cache.namespace="official-3dspeaker-eres-fbank-v1"',
  'chunking.train_min_crop_seconds=6.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=true',
  'silence_augmentation.max_leading_padding_seconds=0.18',
  'silence_augmentation.max_trailing_padding_seconds=0.35',
  'silence_augmentation.max_inserted_pauses=3',
  'silence_augmentation.min_inserted_pause_seconds=0.06',
  'silence_augmentation.max_inserted_pause_seconds=0.30',
  'silence_augmentation.pause_ratio_min=0.85',
  'silence_augmentation.pause_ratio_max=1.55',
  'augmentation_scheduler.enabled=true',
  'augmentation_scheduler.warmup_epochs=1',
  'augmentation_scheduler.ramp_epochs=3',
  'augmentation_scheduler.max_augmentations_per_sample=2',
  'augmentation_scheduler.clean_probability_start=0.65',
  'augmentation_scheduler.clean_probability_end=0.35',
  'augmentation_scheduler.light_probability_start=0.30',
  'augmentation_scheduler.light_probability_end=0.35',
  'augmentation_scheduler.medium_probability_start=0.05',
  'augmentation_scheduler.medium_probability_end=0.20',
  'augmentation_scheduler.heavy_probability_start=0.0',
  'augmentation_scheduler.heavy_probability_end=0.10',
  'augmentation_scheduler.family_weights.noise=1.10',
  'augmentation_scheduler.family_weights.reverb=0.85',
  'augmentation_scheduler.family_weights.distance=0.90',
  'augmentation_scheduler.family_weights.codec=1.05',
  'augmentation_scheduler.family_weights.silence=1.00',
  'augmentation_scheduler.family_weights.speed=0.35',
]

[data]
train_manifest = "artifacts/manifests/pseudo_h8_official_eres/h8_official_eres_filtered_mixed_train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/official-3dspeaker-eres2net-large-filtered-pseudo-lowlr"
trials_manifest = ""
checkpoint_name = "official_3dspeaker_eres2net_encoder.pt"
generate_demo_artifacts_if_missing = false
max_dev_rows = 1024

[model]
speakerlab_root = "/tmp/3D-Speaker"
feat_dim = 80
embedding_size = 512
m_channels = 64
model_id = "iic/speech_eres2net_large_sv_zh-cn_3dspeaker_16k"

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
scale = 32.0
margin = 0.2
easy_margin = false
pseudo_label_smoothing = 0.0
pseudo_loss_weight = 1.0

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.00002
min_learning_rate = 0.000002
momentum = 0.9
weight_decay = 0.00005
warmup_epochs = 1
gradient_accumulation_steps = 1
grad_clip_norm = 5.0
early_stopping_enabled = true
early_stopping_monitor = "train_loss"
early_stopping_min_delta = 0.0005
early_stopping_patience_epochs = 2
early_stopping_min_epochs = 2
early_stopping_restore_best = true
early_stopping_stop_train_accuracy = 0.9975

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "modelscope://iic/speech_eres2net_large_sv_zh-cn_3dspeaker_16k",
  "local://artifacts/baselines/official-3dspeaker-eres2net-large-participants-lowlr",
]
teacher_resources = [
  "local://artifacts/backbone_public/official_3dspeaker_eres2net_large_h8_lowlr_20260414T2113Z",
]
notes = [
  "H9 filtered pseudo-label self-training from the H8 supervised official ERes checkpoint.",
  "Pseudo labels are derived from the H8 public top-200 graph with MS32-style cluster-first settings, then filtered to cluster sizes [8, 80].",
  "This is the direct ERes analogue of the MS31 -> MS32 pseudo stage, not a longer from-scratch ERes2NetV2 run.",
  "Public evaluation uses the same official 3D-Speaker ERes tail with 10s chunking and C4 graph rerank.",
]
