base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="eres2netv2-g6-pseudo-track2-augment"',
  'tracking.run_name_prefix="eres2netv2-g6-pseudo-track2"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=128',
  'training.eval_batch_size=128',
  'training.max_epochs=70',
  'chunking.train_min_crop_seconds=2.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=true',
  'silence_augmentation.max_leading_padding_seconds=0.20',
  'silence_augmentation.max_trailing_padding_seconds=0.45',
  'silence_augmentation.max_inserted_pauses=3',
  'silence_augmentation.min_inserted_pause_seconds=0.08',
  'silence_augmentation.max_inserted_pause_seconds=0.35',
  'silence_augmentation.pause_ratio_min=0.85',
  'silence_augmentation.pause_ratio_max=1.65',
  'augmentation_scheduler.enabled=true',
  'augmentation_scheduler.warmup_epochs=2',
  'augmentation_scheduler.ramp_epochs=8',
  'augmentation_scheduler.max_augmentations_per_sample=3',
  'augmentation_scheduler.clean_probability_start=0.55',
  'augmentation_scheduler.clean_probability_end=0.20',
  'augmentation_scheduler.light_probability_start=0.35',
  'augmentation_scheduler.light_probability_end=0.30',
  'augmentation_scheduler.medium_probability_start=0.10',
  'augmentation_scheduler.medium_probability_end=0.30',
  'augmentation_scheduler.heavy_probability_start=0.0',
  'augmentation_scheduler.heavy_probability_end=0.20',
  'augmentation_scheduler.family_weights.noise=1.20',
  'augmentation_scheduler.family_weights.reverb=1.00',
  'augmentation_scheduler.family_weights.distance=0.95',
  'augmentation_scheduler.family_weights.codec=1.10',
  'augmentation_scheduler.family_weights.silence=0.85',
  'augmentation_scheduler.family_weights.speed=0.75',
]

[data]
train_manifest = "artifacts/manifests/pseudo_g6/g6_mixed_train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/eres2netv2-g6-pseudo-track2-augment"
trials_manifest = ""
checkpoint_name = "eres2netv2_encoder.pt"
generate_demo_artifacts_if_missing = false

[model]
embedding_size = 192
m_channels = 64
base_width = 26
scale = 2
expansion = 2
num_blocks = [3, 4, 6, 3]
pooling_func = "TSTP"
two_embedding_layers = false

[objective]
classifier_blocks = 0
classifier_hidden_dim = 192
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "sgd"
scheduler_name = "cosine"
learning_rate = 0.003
min_learning_rate = 0.000003
momentum = 0.9
weight_decay = 0.00005
warmup_epochs = 3
gradient_accumulation_steps = 1
grad_clip_norm = 5.0
early_stopping_enabled = true
early_stopping_monitor = "train_loss"
early_stopping_min_delta = 0.0005
early_stopping_patience_epochs = 8
early_stopping_min_epochs = 12
early_stopping_restore_best = true
early_stopping_stop_train_accuracy = 0.9975

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "local://artifacts/baselines/eres2netv2-g6-pseudo-finetune/20260412T100738Z-6b686847f5d8/eres2netv2_encoder.pt",
]
notes = [
  "Track 2 augmentation fine-tune from current P3 public-best pseudo-label checkpoint.",
  "Train data is original participant train plus filtered G6 public pseudo clusters.",
  "A1: real noise/music/babble-style noise bank, RIR convolution, and speed perturbation are enabled.",
  "A2: channel/codec-like FFT simulation, random EQ, far-field attenuation, trailing silence, inserted pauses, and random VAD-drop are enabled to match the public test profile.",
  "Max epochs is a cap. Early stopping restores the best train-loss state after a minimum training window.",
]
