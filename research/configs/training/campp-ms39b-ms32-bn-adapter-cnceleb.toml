base_config = "configs/base.toml"
project_overrides = [
  'tracking.enabled=true',
  'tracking.experiment="campp-ms39b-ms32-bn-adapter-cnceleb"',
  'tracking.run_name_prefix="campp-ms39b-ms32-bn-adapter"',
  'runtime.num_workers=8',
  'training.precision="bf16"',
  'training.batch_size=256',
  'training.eval_batch_size=256',
  'training.max_epochs=2',
  'training.domain_balance_enabled=true',
  'training.domain_balance_external_share=0.30',
  'training.domain_balance_external_source_prefixes=["cnceleb","ffsvc"]',
  'features.frontend="official_campp"',
  'features.output_dtype="float32"',
  'feature_cache.namespace="official-campp-fbank-v1"',
  'chunking.train_min_crop_seconds=6.0',
  'chunking.train_max_crop_seconds=6.0',
  'chunking.train_num_crops=1',
  'chunking.eval_max_full_utterance_seconds=6.0',
  'chunking.eval_chunk_seconds=6.0',
  'chunking.eval_chunk_overlap_seconds=1.5',
  'chunking.eval_pooling="mean"',
  'vad.mode="none"',
  'silence_augmentation.enabled=true',
  'silence_augmentation.max_leading_padding_seconds=0.10',
  'silence_augmentation.max_trailing_padding_seconds=0.22',
  'silence_augmentation.max_inserted_pauses=2',
  'silence_augmentation.min_inserted_pause_seconds=0.06',
  'silence_augmentation.max_inserted_pause_seconds=0.22',
  'silence_augmentation.pause_ratio_min=0.92',
  'silence_augmentation.pause_ratio_max=1.30',
  'augmentation_scheduler.enabled=true',
  'augmentation_scheduler.warmup_epochs=0',
  'augmentation_scheduler.ramp_epochs=1',
  'augmentation_scheduler.max_augmentations_per_sample=1',
  'augmentation_scheduler.clean_probability_start=0.85',
  'augmentation_scheduler.clean_probability_end=0.65',
  'augmentation_scheduler.light_probability_start=0.13',
  'augmentation_scheduler.light_probability_end=0.27',
  'augmentation_scheduler.medium_probability_start=0.02',
  'augmentation_scheduler.medium_probability_end=0.07',
  'augmentation_scheduler.heavy_probability_start=0.0',
  'augmentation_scheduler.heavy_probability_end=0.01',
  'augmentation_scheduler.family_weights.noise=1.00',
  'augmentation_scheduler.family_weights.reverb=0.65',
  'augmentation_scheduler.family_weights.distance=0.65',
  'augmentation_scheduler.family_weights.codec=0.85',
  'augmentation_scheduler.family_weights.silence=0.75',
  'augmentation_scheduler.family_weights.speed=0.12',
]

[data]
train_manifest = "artifacts/manifests/cnceleb_v2_ms39/cnceleb_v2_ms39_mixed_train_manifest.jsonl"
dev_manifest = "artifacts/manifests/participants_fixed/dev_manifest.jsonl"
output_root = "artifacts/baselines/campp-ms39b-ms32-bn-adapter-cnceleb"
trials_manifest = ""
checkpoint_name = "campp_encoder.pt"
generate_demo_artifacts_if_missing = false
max_dev_rows = 1024

[model]
embedding_size = 512
growth_rate = 32
bottleneck_scale = 4
init_channels = 128
head_channels = 32
head_res_blocks = [2, 2]
tdnn_stride = 2
block_layers = [12, 24, 16]
block_kernel_sizes = [3, 3, 3]
block_dilations = [1, 2, 2]
config = "batchnorm-relu"
memory_efficient = true

[objective]
classifier_blocks = 0
classifier_hidden_dim = 512
subcenters_per_class = 1
scale = 32.0
margin = 0.2
easy_margin = false

[optimization]
optimizer_name = "adamw"
scheduler_name = "cosine"
learning_rate = 0.00004
min_learning_rate = 0.000004
momentum = 0.9
weight_decay = 0.0
warmup_epochs = 0
gradient_accumulation_steps = 1
grad_clip_norm = 3.0
early_stopping_enabled = true
early_stopping_monitor = "train_loss"
early_stopping_min_delta = 0.0003
early_stopping_patience_epochs = 1
early_stopping_min_epochs = 1
early_stopping_restore_best = true
early_stopping_stop_train_accuracy = 0.9975

[provenance]
ruleset = "standard"
initialization = "pretrained"
pretrained_resources = [
  "local://artifacts/baselines/campp-ms31-official-pseudo-filtered-lowlr/20260414T055357Z-f1f2fa87143a/campp_encoder.pt",
  "openslr://82/cn-celeb_v2.tar.gz",
]
notes = [
  "MS39 branch B: parameter-efficient CN-Celeb adaptation from MS32.",
  "The launcher must call research/scripts/run_campp_finetune.py with --encoder-trainable-scope batchnorm-affine.",
  "Encoder convolution/linear weights remain frozen; only BatchNorm affine tensors and running stats adapt while the proxy classifier trains for supervision.",
  "The MS32 start is deliberately slightly lower LR and lighter augmentation than the MS31 branch because late MS32 full fine-tuning has been fragile.",
  "Training data is participant train plus CN-Celeb v2 OpenSLR 82 external train split generated by research/scripts/build_cnceleb_manifests.py.",
  "Public evaluation should keep the MS32 C4 tail settings to isolate encoder/training effects.",
]
