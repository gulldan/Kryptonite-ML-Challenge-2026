[run]
model_id = "microsoft/wavlm-base-plus-sv"
revision = ""
hf_token_env = "HUGGINGFACE_HUB_TOKEN"
project_root = "."
train_manifest = "artifacts/manifests/participants_fixed/train_manifest.jsonl"
output_root = "artifacts/baselines/wavlm-base-plus-sv-e1-domain-finetune"
seed = 42
batch_size = 96
num_workers = 8
max_epochs = 3
steps_per_epoch = 8000
crop_seconds = 4.0
train_min_crop_seconds = 2.0
train_max_crop_seconds = 6.0
learning_rate = 0.000003
classifier_learning_rate = 0.0005
min_learning_rate_ratio = 0.05
weight_decay = 0.01
warmup_steps = 1000
grad_clip_norm = 1.0
scale = 32.0
margin = 0.2
precision = "bf16"
device = "cuda"
freeze_feature_encoder = true
gradient_checkpointing = true
log_every_steps = 100
augmentation_enabled = true
bandlimit_probability = 0.45
edge_silence_probability = 0.45
max_leading_silence_seconds = 0.8
max_trailing_silence_seconds = 1.4
peak_limit_probability = 0.2
gain_probability = 0.25
gain_min_db = -3.0
gain_max_db = 2.0
noise_probability = 0.15
noise_min_snr_db = 18.0
noise_max_snr_db = 35.0
