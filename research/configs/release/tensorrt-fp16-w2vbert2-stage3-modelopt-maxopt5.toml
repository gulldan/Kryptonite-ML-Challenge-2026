title = "Kryptonite W2V-BERT 2.0 stage3 ModelOpt TensorRT FP16 maxopt5 engine"
project_root = "."
onnx_path = "artifacts/model-bundle-w2vbert2-stage3-onnx-modelopt-fp16/model_modelopt_fp16.onnx"
engine_path = "artifacts/model-bundle-w2vbert2-stage3-onnx-modelopt-fp16/model_maxopt5.plan"
output_root = "artifacts/release/w2vbert2-stage3/modelopt-fp16-maxopt5"
output_name = "embedding"
workspace_size_mib = 32768
builder_optimization_level = 5
fp16 = true

[[profiles]]
profile_id = "crop6"

[profiles.inputs.input_features]
min = [1, 299, 160]
opt = [512, 299, 160]
max = [1024, 299, 160]

[profiles.inputs.attention_mask]
min = [1, 299]
opt = [512, 299]
max = [1024, 299]

[validation]
enabled = true
max_mean_abs_diff = 0.05
max_cosine_distance = 0.01

[[validation.samples]]
sample_id = "crop6_b1"
shapes = { input_features = [1, 299, 160], attention_mask = [1, 299] }

[benchmark]
warmup_iterations = 10
benchmark_iterations = 50

[[benchmark.samples]]
sample_id = "crop6_b1"
shapes = { input_features = [1, 299, 160], attention_mask = [1, 299] }

[[benchmark.samples]]
sample_id = "crop6_b256"
shapes = { input_features = [256, 299, 160], attention_mask = [256, 299] }

[[benchmark.samples]]
sample_id = "crop6_b1024"
shapes = { input_features = [1024, 299, 160], attention_mask = [1024, 299] }
