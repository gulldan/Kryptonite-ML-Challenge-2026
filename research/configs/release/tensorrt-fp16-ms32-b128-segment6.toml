title = "Kryptonite MS32 CAM++ TensorRT FP16 batch-128 segment6 engine"
report_id = "kryptonite-2026-ms32-campp-tensorrt-fp16-b128-segment6"
summary = """
Build a TensorRT FP16 engine for the MS32 CAM++ encoder with a single
public-inference profile optimized for full-submit 6-second segment traffic.
This is the speed-comparison engine; broad multi-profile builds are preparation
diagnostics and are not used for the full-submit speed number.
"""
project_root = "."
output_root = "artifacts/release/ms32-campp/fp16-b128-segment6"

validation_commands = [
  "uv run --group train python research/scripts/export_campp_onnx.py --config configs/base.toml --checkpoint artifacts/baselines/campp-ms31-official-pseudo-filtered-lowlr/20260414T055357Z-f1f2fa87143a/campp_encoder.pt --output-root artifacts/model-bundle-campp-ms32-onnx --model-version campp-ms32-filtered-pseudo-onnx --sample-frame-count 600",
  "uv run --group train python research/scripts/build_tensorrt_fp16_engine.py --config research/configs/release/tensorrt-fp16-ms32-b128-segment6.toml",
]

notes = [
  "The speed metric starts after this engine exists; ONNX export and TensorRT build are excluded from full-submit timing.",
  "The profile targets the public 6-second segment path after the official CAM++ frontend.",
  "Use this engine only after validating quality and comparing full public output against the source MS41 submission.",
]

[artifacts]
model_bundle_metadata_path = "artifacts/model-bundle-campp-ms32-onnx/metadata.json"
engine_output_path = "artifacts/model-bundle-campp-ms32-onnx/model_b128_segment6.plan"

[build]
workspace_size_mib = 4096
promote_validated_backend = false
require_onnxruntime_parity = false

[[build.profiles]]
profile_id = "segment6_b128"
min_batch_size = 1
opt_batch_size = 128
max_batch_size = 128
min_frame_count = 80
opt_frame_count = 600
max_frame_count = 800

[evaluation]
seed = 20260416
warmup_iterations = 10
benchmark_iterations = 50
max_mean_abs_diff = 0.03
max_cosine_distance = 0.001
min_speedup_ratio = 1.05

[[evaluation.samples]]
sample_id = "segment6_b1"
batch_size = 1
frame_count = 600

[[evaluation.samples]]
sample_id = "segment6_b64"
batch_size = 64
frame_count = 600

[[evaluation.samples]]
sample_id = "segment6_b128"
batch_size = 128
frame_count = 600
