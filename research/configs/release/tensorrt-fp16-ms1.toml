title = "Kryptonite MS1 CAM++ TensorRT FP16 engine"
report_id = "kryptonite-2026-ms1-campp-tensorrt-fp16"
summary = """
Build a TensorRT FP16 engine from the exported ModelScope CAM++ VoxCeleb encoder
bundle and compare encoder embeddings plus latency against the source PyTorch
checkpoint on deterministic feature-tensor samples.
"""
project_root = "."
output_root = "artifacts/release/ms1-campp/fp16"

validation_commands = [
  "uv run python research/scripts/export_campp_onnx.py --config configs/base.toml --checkpoint artifacts/backbone_public/modelscope_campplus_voxceleb_default/converted/modelscope_campplus_voxceleb_encoder.pt --output-root artifacts/model-bundle-campp-ms1-onnx --model-version campp-ms1-modelscope-voxceleb-onnx --sample-frame-count 600",
  "uv run python research/scripts/build_tensorrt_fp16_engine.py --config research/configs/release/tensorrt-fp16-ms1.toml",
]

notes = [
  "This workflow targets the MS1 ModelScope CAM++ VoxCeleb encoder that produced the best known public branch.",
  "The engine boundary starts at official 80-bin Fbank features; raw audio decode, fbank, segmenting, and retrieval remain outside TensorRT.",
  "ONNX Runtime parity is not required as a precondition here because TensorRT validation compares directly against the source PyTorch checkpoint.",
]

[artifacts]
model_bundle_metadata_path = "artifacts/model-bundle-campp-ms1-onnx/metadata.json"
engine_output_path = "artifacts/model-bundle-campp-ms1-onnx/model.plan"

[build]
workspace_size_mib = 4096
promote_validated_backend = true
require_onnxruntime_parity = false

[[build.profiles]]
profile_id = "short"
min_batch_size = 1
opt_batch_size = 16
max_batch_size = 32
min_frame_count = 80
opt_frame_count = 120
max_frame_count = 180

[[build.profiles]]
profile_id = "mid"
min_batch_size = 1
opt_batch_size = 32
max_batch_size = 64
min_frame_count = 80
opt_frame_count = 256
max_frame_count = 384

[[build.profiles]]
profile_id = "segment6"
min_batch_size = 1
opt_batch_size = 64
max_batch_size = 64
min_frame_count = 80
opt_frame_count = 600
max_frame_count = 800

[evaluation]
seed = 20260413
warmup_iterations = 10
benchmark_iterations = 50
max_mean_abs_diff = 0.03
max_cosine_distance = 0.001
min_speedup_ratio = 1.05

[[evaluation.samples]]
sample_id = "short"
batch_size = 1
frame_count = 100

[[evaluation.samples]]
sample_id = "mid"
batch_size = 1
frame_count = 240

[[evaluation.samples]]
sample_id = "segment6"
batch_size = 1
frame_count = 600
