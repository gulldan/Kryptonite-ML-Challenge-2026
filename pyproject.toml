[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "kryptonite-ml-challenge-2026"
version = "0.1.0"
description = "Monorepo scaffold for the Kryptonite Dataton 2026 speaker-recognition project."
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = []

[dependency-groups]
dev = [
  "pytest>=8.4.0",
  "ruff>=0.13.0",
  "ty>=0.0.24",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kryptonite"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
src = ["src", "tests"]
target-version = "py312"

[tool.ruff.lint]
select = ["B", "E", "F", "I", "UP"]
fixable = ["ALL"]

[tool.ruff.format]
docstring-code-format = true

[tool.ty.environment]
python-version = "3.12"
root = ["./src"]

[tool.ty.src]
include = ["src", "tests"]

[tool.ty.terminal]
error-on-warning = true
